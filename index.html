<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Billardkrüppel</title>
    <link rel="manifest" href="manifest.json?v=1.0.3">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" type="image/png" href="logo_html.png?v=2">
    <link rel="shortcut icon" type="image/png" href="logo_html.png?v=2">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Billard">
    <link rel="apple-touch-icon" href="logo_html.png?v=2">
    <script src="https://cdn.jsdelivr.net/npm/chart.js" defer></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #ffcc00; --error: #ff3b30; --text: #ffffff;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            background: var(--bg); color: var(--text); margin: 0; padding: 0; 
            font-family: -apple-system, sans-serif; height: 100vh; width: 100%; 
            overflow: hidden; -webkit-user-select: none;
        }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: fixed; }
        .main-content { flex: 1; overflow-y: auto; padding: 0 16px 120px 16px; -webkit-overflow-scrolling: touch; }
        .view { display: none; flex-direction: column; width: 100%; } 
        .view.active { display: flex; }
        .card { background: var(--card); border-radius: 20px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .header-container { position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); padding: calc(var(--safe-top) + 10px) 16px 10px 16px; display: flex; align-items: center; justify-content: center; gap: 12px; margin: 0 -16px 15px -16px; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); }
        .header-side { display: flex; align-items: center; }
        .header-side.right { justify-content: flex-end; }
        .logo-img { height: 30px; width: auto; object-fit: contain; }
        .title-stack { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .main-title { font-weight: 900; font-size: 18px; line-height: 1; letter-spacing: -0.5px; color: var(--accent); text-transform: uppercase; }
        .sub-title { color: #8e8e93; font-size: 9px; font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .tab-bar { position: absolute; bottom: calc(var(--safe-bottom) + 10px); left: 12px; right: 12px; background: rgba(35, 35, 35, 0.1); backdrop-filter: blur(45px) saturate(250%) brightness(1.2); -webkit-backdrop-filter: blur(45px) saturate(250%) brightness(1.2); border: 0.5px solid rgba(255, 255, 255, 0.15); display: flex; border-radius: 38px; height: 70px; z-index: 9999; padding: 0 6px; align-items: center; box-shadow: 0 18px 45px rgba(0,0,0,0.5); }
        .tab-indicator { position: absolute; height: 54px; background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10)); border-radius: 32px; transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2); z-index: 0; }
        .tab-item { flex: 1; height: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 8.5px; font-weight: 800; border-radius: 32px; transition: all 0.3s; position: relative; z-index: 1; }
        .tab-item.active { color: #ffffff; } .tab-item.active .tab-icon { transform: scale(1.2) translateY(-2px); color: var(--accent); }
        .tab-icon { font-size: 21px; margin-bottom: 2px; }
        
        label { display: block; margin-bottom: 4px; color: #8e8e93; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding-left: 4px; }
        select, input { width: 100%; padding: 12px; background: rgba(44, 44, 46, 0.8); border: 1px solid rgba(255,255,255,0.1); border-radius: 14px; color: white; outline: none; margin-bottom: 8px; font-size: 15px; -webkit-appearance: none; }
        
        .win-text { color: #34c759; font-weight: 800; }
        .loss-text { color: #ff3b30; font-weight: 800; }

        .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        .filter-bar { display: flex; gap: 8px; padding: 10px 0; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .filter-pill { padding: 8px 16px; border-radius: 20px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #8e8e93; font-size: 11px; font-weight: 800; white-space: nowrap; transition: all 0.2s; }
        .filter-pill.active { background: var(--accent); color: #000; border-color: var(--accent); }
        
        .modal { position: fixed; inset: 0; z-index: 20000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(8px); }
        .modal-card { position: relative; width: 100%; max-width: 420px; max-height: 85vh; background: #1c1c1e; border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; overflow: hidden; display: flex; flex-direction: column; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        .btn-save { background: #34c759; color: white; border: none; padding: 14px; border-radius: 16px; font-size: 16px; font-weight: 900; width: 100%; transition: opacity 0.2s; }
        .btn-save:active { opacity: 0.8; }
        .win-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #8e8e93; font-weight: 800; text-align: center; }
        .win-btn.selected { border-color: var(--accent); background: rgba(255, 204, 0, 0.15); color: var(--accent); }

        .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        .loader-logo { height: 80px; width: auto; margin-bottom: 15px; }
        .loader-title { font-weight: 900; font-size: 24px; color: var(--accent); text-transform: uppercase; margin-bottom: 30px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 204, 0, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .prob-box{padding:12px;border-radius:16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);margin-bottom:15px;display:none;}
        .prob-title{color:var(--accent);font-weight:900;font-size:10px;text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;}
        .prob-row{display:flex;justify-content:space-between;margin-bottom:8px; gap: 10px;}
        .prob-pill{font-size:11px;font-weight:900;padding:6px 12px;border-radius:20px;background:rgba(255,255,255,0.06);color:#fff;flex:1;text-align:center;}
        .prob-bar{height:6px;border-radius:10px;background:rgba(255,255,255,0.1);overflow:hidden;}
        .prob-bar>div{height:100%;background:linear-gradient(90deg,#34c759,#4FC3F7);transition: width 0.5s ease;}
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <img src="logo.png" class="loader-logo" onerror="this.style.display='none'">
        <div class="loader-title">Billardkrüppel</div>
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: 900; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">Synchronisiere...</div>
    </div>

    <div class="app-container">
        <div class="main-content" id="scroll-area">
            
            <!-- Ansicht: Aufzeichnen -->
            <div id="view-aufzeichnen" class="view active">
                <div class="header-container">
                    <div class="header-side"><img src="logo.png" class="logo-img" onerror="this.style.display='none'"></div>
                    <div class="title-stack"><div class="main-title">Billardkrüppel</div><div class="sub-title">Match erfassen</div></div>
                    <div class="header-side right"><img src="logo.png" class="logo-img" style="cursor:pointer; opacity: 0.6;" onclick="window.forceUpdate()" title="Update suchen" onerror="this.style.display='none'"></div>
                </div>
                <div class="card">
                    <label>Spielmodus</label>
                    <select id="mode" onchange="updateUI()">
                        <option value="1:1">1 gegen 1</option>
                        <option value="2:2">2 gegen 2</option>
                    </select>
                    <div id="ui-1-1">
                        <label>Spieler 1</label><select class="player-sel" id="p1" onchange="updateMatchProbability()"></select>
                        <label>Spieler 2</label><select class="player-sel" id="p2" onchange="updateMatchProbability()"></select>
                    </div>
                    <div id="ui-2-2" style="display:none;">
                        <label>Team 1</label>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom:8px;">
                            <select class="player-sel" id="t1p1" onchange="updateMatchProbability()"></select><select class="player-sel" id="t1p2" onchange="updateMatchProbability()"></select>
                        </div>
                        <label>Team 2</label>
                        <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 8px;">
                            <select class="player-sel" id="t2p1" onchange="updateMatchProbability()"></select><select class="player-sel" id="t2p2" onchange="updateMatchProbability()"></select>
                        </div>
                    </div>
                    <br>
                    <label>Anstoß</label>
                    <div style="display:flex; gap:10px;">
                        <button id="btn-breakcalc" class="win-btn" style="flex:1; background: rgba(255,204,0,0.1); color: var(--accent);" onclick="window.calcBreak()">Zufall</button>
                        <select id="breakPlayer" style="flex:1.5; margin-bottom:0;" onchange="window.lockBreak()"></select>
                    </div>
                </div>
                <div id="match-prob" class="prob-box" style="margin-top:-5px;"></div>
                <div class="card">
                    <label>Gewinner wählen</label>
                    <div style="display:flex; gap:10px; margin-bottom:10px;">
                        <div id="btn-win1" class="win-btn" onclick="window.selectWinner(1)">Team 1</div>
                        <div id="btn-win2" class="win-btn" onclick="window.selectWinner(2)">Team 2</div>
                    </div>
                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 8px;">
                        <div><label>Wie gewonnen</label><select id="winType"><option value="Normal">Normal</option><option value="Verlierer hat Schwarz versenkt">Verlierer hat Schwarz versenkt</option></select></div>
                        <div><label>Restkugeln Verlierer</label><input type="number" inputmode="numeric" id="leftover" value="0" onfocus="if(this.value==='0')this.value=''"></div>
                    </div>
                    <button class="btn-save" onclick="window.doSave()">Speichern</button>
                </div>
            </div>

            <div id="view-uebersicht" class="view">
                <div class="header-container">
                    <div class="header-side"><img src="logo.png" class="logo-img" onerror="this.style.display='none'"></div>
                    <div class="title-stack"><div class="main-title">Historie</div><div class="sub-title">Letzte Partien</div></div>
                    <div class="header-side right"><img src="logo.png" class="logo-img" style="cursor:pointer; opacity: 0.6;" onclick="window.forceUpdate()" onerror="this.style.display='none'"></div>
                </div>
                <div id="match-counter" style="text-align:center; font-size:12px; color:#8e8e93; margin-bottom:15px;">Matches: 0</div>
                <div id="history-list"></div>
            </div>

            <div id="view-statistik" class="view">
                <div class="header-container">
                    <div class="header-side"><img src="logo.png" class="logo-img" onerror="this.style.display='none'"></div>
                    <div class="title-stack"><div class="main-title" id="stat-title">Statistik</div><div class="sub-title">Analysen</div></div>
                    <div class="header-side right"><img src="logo.png" class="logo-img" style="cursor:pointer; opacity: 0.6;" onclick="window.forceUpdate()" onerror="this.style.display='none'"></div>
                </div>
                <div id="stat-content-wrapper">
                    <div class="card"><label>Siegquote %</label><div style="height:160px;"><canvas id="winChart"></canvas></div></div>
                    <div class="card" id="eloTrendCard">
                        <label>Ranking & Form</label>
                        <div id="eloRanking"></div>
                        <div id="trendPlayers" style="margin-top:12px;"></div>
                    </div>
                    <div class="stat-grid">
                        <div class="card"><label>Matches</label><div id="stat-total" style="font-size:18px; font-weight:800;">0</div></div>
                        <div class="card"><label>Break-Adv.</label><div id="stat-break-adv" style="font-size:18px; font-weight:800; color:#34c759;">0%</div></div>
                        <div class="card"><label>Fehler-Sieg</label><div id="stat-black" style="font-size:13px; font-weight:800; color:#ff3b30;">0%</div></div>
                        <div class="card"><label>Pechvogel</label><div id="stat-pechvogel" style="font-size:11px; font-weight:800;">-</div></div>
                        <div class="card"><label>Clutch</label><div id="stat-clutch" style="font-size:11px; font-weight:800; color:#007aff;">-</div></div>
                        <div class="card"><label>Killer</label><div id="stat-killer" style="font-size:11px; font-weight:800; color:#ff3b30;">-</div></div>
                        <div class="card" style="grid-column: span 2;"><label>Bestes Team</label><div id="stat-team" style="font-weight:800; color:#5856d6;">-</div></div>
                        <div class="card"><label>Angstgegner</label><div id="stat-angst" style="font-weight:800; font-size:11px; color:#ff9500;">-</div></div>
                        <div class="card"><label>Längste Serie</label><div id="stat-streak" style="font-weight:800; font-size:11px;">-</div></div>
                    </div>
                    <div id="today-matches-card" class="card" style="display:none;">
                        <label>Heutige Matches</label>
                        <div id="today-match-list" style="margin-top:8px;"></div>
                    </div>
                    <div id="achievements-today"></div>
                </div>
            </div>

            <div id="view-erfolge" class="view">
                <div style="position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(20px); margin: 0 -16px 15px -16px; border-bottom: 0.5px solid rgba(255, 255, 255, 0.1); padding-top: calc(var(--safe-top) + 10px);">
                    <div class="header-container" style="position: relative; background: transparent; backdrop-filter: none; border-bottom: none; margin: 0;">
                        <div class="header-side"><img src="logo.png" class="logo-img" onerror="this.style.display='none'"></div>
                        <div class="title-stack"><div class="main-title">Erfolge</div><div class="sub-title">Bestenliste</div></div>
                        <div class="header-side right"><img src="logo.png" class="logo-img" style="cursor:pointer; opacity: 0.6;" onclick="window.forceUpdate()" onerror="this.style.display='none'"></div>
                    </div>
                    <div style="padding: 0 16px 15px 16px;">
                        <button class="btn-save" style="background:rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); font-size: 11px;" onclick="openAchListModal()">Achievement-Übersicht</button>
                    </div>
                </div>
                <div id="achievements-alltime"></div>
            </div>
        </div>

        <div class="tab-bar">
            <div id="tab-indicator" class="tab-indicator"></div>
            <div class="tab-item active" onclick="switchV('aufzeichnen',this)"><span class="tab-icon">🎱</span><span>Match</span></div>
            <div class="tab-item" onclick="switchV('heute',this)"><span class="tab-icon">📅</span><span>Heute</span></div>
            <div class="tab-item" onclick="switchV('statistik',this)"><span class="tab-icon">📊</span><span>Gesamt</span></div>
            <div class="tab-item" onclick="switchV('erfolge',this)"><span class="tab-icon">🎖️</span><span>Erfolge</span></div>
            <div class="tab-item" onclick="switchV('uebersicht',this)"><span class="tab-icon">📜</span><span>Historie</span></div>
        </div>
    </div>

    <div id="achListModal" class="modal">
        <div class="modal-backdrop" onclick="closeAchListModal()"></div>
        <div class="modal-card">
            <div style="padding: 20px 20px 0 20px;">
                <div style="font-weight:900;color:var(--accent);font-size:16px;text-transform:uppercase;text-align:center;margin-bottom:15px;">Achievement-Liste</div>
                <div class="filter-bar">
                    <div class="filter-pill active" onclick="renderAchList('all')">Alle</div>
                    <div class="filter-pill" onclick="renderAchList('fame')">Fame</div>
                    <div class="filter-pill" onclick="renderAchList('shame')">Shame</div>
                    <div class="filter-pill" onclick="renderAchList('daily')">Täglich</div>
                </div>
            </div>
            <div id="achListContainer" style="flex:1; overflow-y:auto; padding:15px;"></div>
            <div style="padding:20px; border-top:1px solid rgba(255,255,255,0.05);">
                <button class="btn-save" style="margin-top:0;" onclick="closeAchListModal()">Schließen</button>
            </div>
        </div>
    </div>

    <script src="Chart.js?v=1.0.3"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyD7bNfdV48Setz8aRNd4i3kzKO41kNOHio", 
            authDomain: "billardpro-35edb.firebaseapp.com", 
            projectId: "billardpro-35edb", 
            storageBucket: "billardpro-35edb.firebasestorage.app", 
            messagingSenderId: "772454762231", 
            appId: "1:772454762231:web:c8fb5794d5af99b045f5f2" 
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

         // hideLoader SOFORT definieren, damit es für Snapshots und Timeouts verfügbar ist
        window.hideLoader = () => {
            const l = document.getElementById('loading-overlay');
            if(l && l.style.display !== 'none') { 
                l.style.opacity = '0'; 
                setTimeout(() => l.style.display = 'none', 400); 
            }
        };

        window.db = db; 
        window.dbFns = { doc, setDoc, getDoc, updateDoc };
        window.stats = []; window.spieler = []; window.dailyAchivs = { days: {} };
        window.winnerNum = 0; window.viewId = 'aufzeichnen'; window.breakLocked = false;

        // Navigation und Tab-Wechsel
        window.switchV = (id, el) => {
            window.viewId = id;
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            
            // 'heute' und 'statistik' teilen sich die gleiche View, aber mit unterschiedlichen Datenfiltern
            const targetViewId = (id === 'heute' || id === 'statistik') ? 'view-statistik' : 'view-' + id;
            const targetView = document.getElementById(targetViewId);
            if (targetView) targetView.classList.add('active');
            
            if (el) el.classList.add('active');
            
            // Tab-Indikator (gelber Hintergrund) verschieben
            if (el) {
                const ind = document.getElementById('tab-indicator');
                ind.style.width = el.offsetWidth + "px";
                ind.style.left = el.offsetLeft + "px";
            }
            
            window.updateAllViews();
            const scrollArea = document.getElementById('scroll-area');
            if (scrollArea) scrollArea.scrollTop = 0;
        };

        window.forceUpdate = () => {
            if(confirm("App neu laden, um nach Updates zu suchen?")) {
                const url = window.location.href.split('?')[0];
                window.location.href = url + '?u=' + Date.now();
            }
        };

        // Zentrale Funktion zum Rendern der aktiven Ansicht
        window.updateAllViews = () => {
            if (typeof window.renderBillardStats !== 'function') return;
            if (window.viewId === 'uebersicht') renderHistory();
            if (window.viewId === 'statistik' || window.viewId === 'heute' || window.viewId === 'erfolge') {
                const isToday = (window.viewId === 'heute');
                window.renderBillardStats(window.stats, isToday);
            }
        };

        // Sicherheits-Timeout: Falls Firebase hängt, Loader nach 5 Sek trotzdem entfernen
        setTimeout(() => window.hideLoader(), 6000);

        signInAnonymously(auth).then(() => {
            onSnapshot(doc(db, "billard_data", "stats"), (snap) => {
                try {
                    if (snap.exists()) {
                        window.stats = snap.data().matches || [];
                        if (typeof window.updateAllViews === 'function') {
                            window.updateAllViews();
                        }
                    }
                } catch (e) { console.error("Render-Fehler:", e); }
                window.hideLoader();
            }, (err) => { 
                console.error("Firebase Stats Fehler:", err);
                window.hideLoader(); 
            });

            onSnapshot(doc(db, "billard_data", "spieler"), (snap) => {
              if (snap.exists()) {
                  window.spieler = snap.data().names || [];
                  window.initDropdowns();
              }
            }, (err) => console.error("Firebase Spieler Fehler:", err));
            
            onSnapshot(doc(db, "billard_data", "daily_achivs"), (snap) => { if (snap.exists()) window.dailyAchivs = snap.data(); });
        }).catch(err => {
            console.error("Firebase Login Fehler:", err);
            window.hideLoader();
        });

        window.initDropdowns = () => {
            document.querySelectorAll('.player-sel').forEach(s => {
                s.innerHTML = '<option disabled selected value="">Wählen</option>';
                window.spieler.forEach(p => s.options.add(new Option(p, p)));
                s.onchange = () => { window.updateUI(); };
            });
        };

        window.updateUI = () => {
            const m = document.getElementById('mode').value;
            document.getElementById('ui-1-1').style.display = (m==='1:1'?'block':'none');
            document.getElementById('ui-2-2').style.display = (m==='2:2'?'block':'none');
            
            const getTN = (a, b) => (a && b) ? a + " & " + b : (a || b || "");
            const n1 = (m==='1:1') ? document.getElementById('p1').value : getTN(document.getElementById('t1p1').value, document.getElementById('t1p2').value);
            const n2 = (m==='1:1') ? document.getElementById('p2').value : getTN(document.getElementById('t2p1').value, document.getElementById('t2p2').value);
            document.getElementById('btn-win1').innerText = n1 || "Seite 1";
            document.getElementById('btn-win2').innerText = n2 || "Seite 2";

            if (!window.breakLocked) {
              const b = document.getElementById('breakPlayer');
              b.innerHTML = '<option value="" selected disabled>Wählen</option>';
              const names = (m==='1:1') ? [document.getElementById('p1').value, document.getElementById('p2').value] : 
                            [document.getElementById('t1p1').value+" & "+document.getElementById('t1p2').value, document.getElementById('t2p1').value+" & "+document.getElementById('t2p2').value];
              names.forEach(n => { if(n && !n.includes('undefined')) b.options.add(new Option(n, n)); });
            }
            
            window.winnerNum = 0;
            document.querySelectorAll('.win-btn').forEach(btn => btn.classList.remove('selected'));
            
            const ready = (m==='1:1' ? (document.getElementById('p1').value && document.getElementById('p2').value) : (document.getElementById('t1p1').value && document.getElementById('t1p2').value && document.getElementById('t2p1').value && document.getElementById('t2p2').value));
            document.getElementById('btn-breakcalc').disabled = !ready;
            window.updateMatchProbability();
        };

        window.lockBreak = () => { window.breakLocked = true; };
        window.selectWinner = (n) => {
            window.winnerNum = n;
            document.getElementById('btn-win1').classList.toggle('selected', n===1);
            document.getElementById('btn-win2').classList.toggle('selected', n===2);
        };

        window.calcBreak = () => {
            const m = document.getElementById('mode').value;
            const c = (m === '1:1') ? [document.getElementById('p1').value, document.getElementById('p2').value] : [document.getElementById('t1p1').value, document.getElementById('t1p2').value, document.getElementById('t2p1').value, document.getElementById('t2p2').value];
            const picked = c.filter(Boolean)[Math.floor(Math.random() * c.filter(Boolean).length)];
            if(!picked) return;
            let res = picked;
            if(m === '2:2') {
              if(picked === document.getElementById('t1p1').value || picked === document.getElementById('t1p2').value) res = document.getElementById('t1p1').value + " & " + document.getElementById('t1p2').value;
              else res = document.getElementById('t2p1').value + " & " + document.getElementById('t2p2').value;
            }
            document.getElementById('breakPlayer').value = res;
            window.breakLocked = true;
        };

        window.doSave = async () => {
            const m = document.getElementById('mode').value;
            const b = document.getElementById('breakPlayer').value;
            let p1, p2;
            if (m === '1:1') { p1 = document.getElementById('p1').value; p2 = document.getElementById('p2').value; }
            else { p1 = document.getElementById('t1p1').value + " & " + document.getElementById('t1p2').value; p2 = document.getElementById('t2p1').value + " & " + document.getElementById('t2p2').value; }
            if (!window.winnerNum || !p1 || !p2 || !b) return alert("Bitte alles ausfüllen!");
            const now = new Date();
            
            const pad = (n) => String(n).padStart(2, '0');
            const dStr = `${pad(now.getDate())}.${pad(now.getMonth() + 1)}.${now.getFullYear()}, ${pad(now.getHours())}:${pad(now.getMinutes())}`;
            const todayStr = `${pad(now.getDate())}.${pad(now.getMonth() + 1)}.${now.getFullYear()}`;

            const data = { m, p1, p2, w: window.winnerNum, t: document.getElementById('winType').value, a: b, l: parseInt(document.getElementById('leftover').value), d: dStr };
            
            const isoDay = now.toISOString().split('T')[0];
            const updatedStats = [...window.stats, data];
            
            // Robuster Vergleich für die heutige Berechnung
            const isSameDay = (d1, d2) => {
                const m1 = String(d1 || "").match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
                if (!m1) return false;
                return parseInt(m1[1], 10) === d2.getDate() && parseInt(m1[2], 10) === (d2.getMonth() + 1) && parseInt(m1[3], 10) === d2.getFullYear();
            };

            const todayMatches = updatedStats.filter(g => g && g.d && isSameDay(g.d, now));
            const procData = window.processAllStatsChronologically(todayMatches, window.spieler);
            const dayResults = {};
            Object.keys(procData.pData).forEach(player => {
              const d = procData.pData[player];
              d.todayWins = d.wins; d.todayGames = d.games; d.todayMaxStreak = d.maxStreak; d.todayClutchWins = d.clutchWins;
              d.todayBreakWins = d.breakWins; d.todayBlackWinsCount = d.blackWinsCount; d.todayKillerPoints = d.killerPoints; d.todayRest = d.rest;
              d.todayAvgRest = (d.games - d.wins) > 0 ? (d.rest / (d.games - d.wins)) : 0;
              const active = [...window.dailyFamePool.filter(ach => ach.cond(d)), ...window.dailyShamePool.filter(ach => ach.cond(d))].map(ach => ach.t);
              if (active.length > 0) dayResults[player] = Array.from(new Set(active));
            });

            if (Object.keys(dayResults).length > 0) {
              const newDaily = { ...window.dailyAchivs };
              newDaily.days[isoDay] = dayResults;
              await window.dbFns.setDoc(window.dbFns.doc(window.db, "billard_data", "daily_achivs"), newDaily);
            }
            window.stats = updatedStats;
            await window.dbFns.setDoc(window.dbFns.doc(window.db, "billard_data", "stats"), { matches: updatedStats });
            
            document.getElementById('leftover').value = "0"; 
            window.winnerNum = 0; 
            window.breakLocked = false;
            document.querySelectorAll('.win-btn').forEach(b => b.classList.remove('selected'));
            document.querySelectorAll('.player-sel').forEach(s => s.value = "");
            document.getElementById('breakPlayer').value = "";
            
            window.updateUI();
            alert("Match & Erfolge gespeichert!");
        };

        window.requestDelete = async (i) => {
            if(!confirm("Löschen?")) return;
            window.stats.splice(i, 1);
            await window.dbFns.setDoc(window.dbFns.doc(window.db, "billard_data", "stats"), { matches: window.stats });
        };

        window.updateMatchProbability = () => {
            const m = document.getElementById('mode').value;
            const b = document.getElementById('match-prob');
            const isReady = (m==='1:1' ? (document.getElementById('p1').value && document.getElementById('p2').value) : (document.getElementById('t1p1').value && document.getElementById('t1p2').value && document.getElementById('t2p1').value && document.getElementById('t2p2').value));
            
            b.style.display='block'; // Immer anzeigen
            if(!isReady) { b.innerHTML = `<div style="color:#8e8e93; font-size:10px; text-align:center; padding:10px; font-weight:800;">Bitte Spieler auswählen, um Prognose zu sehen.</div>`; return; }
            b.style.display='block';
            
            const pIds = (m === '1:1') ? ['p1', 'p2'] : ['t1p1', 't1p2', 't2p1', 't2p2'];
            const pVals = pIds.map(id => document.getElementById(id).value).filter(Boolean);
            if (new Set(pVals).size !== pVals.length) {
                b.innerHTML = `<div style="color:var(--error); font-size:10px; text-align:center; padding:10px; font-weight:800;">⚠️ Doppelte Spieler gewählt!</div>`;
                return;
            }
            
            const elo = window.computeEloRatings(window.stats);
            const getE = (p) => (elo[p] ? elo[p].elo : 1000);
            
            let r1, r2;
            if(m==='1:1') { r1 = getE(document.getElementById('p1').value); r2 = getE(document.getElementById('p2').value); }
            else { r1 = (getE(document.getElementById('t1p1').value)+getE(document.getElementById('t1p2').value))/2; r2 = (getE(document.getElementById('t2p1').value)+getE(document.getElementById('t2p2').value))/2; }
            
            const prob1 = Math.round((1 / (1 + Math.pow(10, (r2 - r1) / 400))) * 100);
            const l1 = (m==='1:1' ? document.getElementById('p1').value : "Team 1");
            const l2 = (m==='1:1' ? document.getElementById('p2').value : "Team 2");

            b.innerHTML = `<div class="prob-title">🎯 Sieg-Prognose</div><div class="prob-row"><div class="prob-pill">${l1}: ${prob1}%</div><div class="prob-pill">${l2}: ${100-prob1}%</div></div><div class="prob-bar"><div style="width:${prob1}%"></div></div><div style="font-size:9px; color:#8e8e93; margin-top:6px; text-align:center;">Basis: Team-ELO Ø (${Math.round(r1)} vs ${Math.round(r2)})</div>`;
        };

        function renderHistory() {
            const container = document.getElementById('history-list');
            document.getElementById('match-counter').innerText = "Matches: " + window.stats.length;
            container.innerHTML = window.stats.slice().reverse().map((g, idx) => {
                const i = window.stats.length - 1 - idx;
                return `<div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <div style="font-size:16px; font-weight:700;"><span class="${g.w==1?'win-text':'loss-text'}">${g.p1}</span> vs <span class="${g.w==2?'win-text':'loss-text'}">${g.p2}</span></div>
                        <div style="text-align: right;">
                            <div style="font-size:11px; color:#8e8e93;">${g.d}</div>
                            <div style="font-size:10px; color:var(--error); font-weight:900; margin-top:8px; text-transform:uppercase;" onclick="requestDelete(${i})">Löschen</div>
                        </div>
                    </div>
                    <div style="font-size:12px; color:#8e8e93; margin-top:8px;">${g.t} | Rest: ${g.l} | Anstoß: ${g.a}</div>
                </div>`;
            }).join("") || '<div style="text-align:center;color:#8e8e93;padding:40px;">Keine Spiele vorhanden.</div>';
        }


        window.openAchListModal = () => { renderAchList('all'); document.getElementById('achListModal').style.display='flex'; };
        window.closeAchListModal = () => { document.getElementById('achListModal').style.display='none'; };
        window.renderAchList = (filter) => { 
            const c = document.getElementById('achListContainer');
            const pills = document.querySelectorAll('.filter-pill');
            const fNames = ['all', 'fame', 'shame', 'daily'];
            pills.forEach((p, idx) => p.classList.toggle('active', fNames[idx] === filter));

            let pool = [];
            if (filter==='all') {
                pool = [...window.famePool.map(a=>({...a,k:'fame'})), ...window.shamePool.map(a=>({...a,k:'shame'})), ...window.dailyFamePool, ...window.dailyShamePool];
            } else if (filter==='fame') {
                pool = window.famePool.map(a=>({...a,k:'fame'}));
            } else if (filter==='shame') {
                pool = window.shamePool.map(a=>({...a,k:'shame'}));
            } else pool = [...window.dailyFamePool, ...window.dailyShamePool];

            c.innerHTML = pool.map(a => {
                const isShame = (a.k === "shame");
                const howColor = isShame ? "rgba(255, 69, 58, 0.70)" : "rgba(52, 199, 89, 0.70)";
                const howIcon  = isShame ? "💀" : "🏆";
                const isMaxTier = a.max === true;
                const phrase = (a.d && a.d.length > 0) ? `"${a.d[0]}"` : "";

                return `<div style="display:flex; align-items:center; gap:12px; margin-bottom:10px; background: rgba(255,255,255,0.03); padding: 10px; border-radius: 12px; border: 0.5px solid rgba(255,255,255,0.05);">
                  <div style="font-size:22px; min-width:35px; text-align:center;">${a.i}</div>
                  <div style="flex:1;">
                    <div style="font-size:12px; font-weight:900; color:#fff;"><span style="${isMaxTier ? 'color:#4FC3F7;' : ''}">${a.t}${isMaxTier ? ' ⭐' : ''}</span></div>
                    ${phrase ? `<div style="font-size:10px; color:#acacb0; font-style:italic; margin-top:2px;">${phrase}</div>` : ''}
                    <div style="font-size:10px; margin-top:3px; color:${howColor};">${howIcon} ${a.h || ""}</div>
                  </div>
                </div>`;
            }).join("");
        };

        // Init Tab-Indikator
        setTimeout(() => { switchV('aufzeichnen', document.querySelector('.tab-item.active')); }, 300);
    </script>
</body>
</html>
