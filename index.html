<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Billardkrüppel</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg: #000000; --card: #1c1c1e; --accent: #ffcc00; --error: #ff3b30; --text: #ffffff;
            --safe-top: env(safe-area-inset-top); --safe-bottom: env(safe-area-inset-bottom);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            background: var(--bg); color: var(--text); margin: 0; padding: 0; 
            font-family: -apple-system, sans-serif; height: 100vh; width: 100%; 
            overflow: hidden; overflow-x: hidden; -webkit-user-select: none; overscroll-behavior-x: none;
        }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; position: fixed; overflow-x: hidden; }
        .main-content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding: 0 16px 120px 16px; }
        .view { display: none; flex-direction: column; width: 100%; } 
        .view.active { display: flex; }
        .card { background: var(--card); border-radius: 20px; padding: 12px; margin-bottom: 8px; border: 1px solid rgba(255,255,255,0.08); box-shadow: 0 4px 16px rgba(0,0,0,0.3); }
        .header-container { 
            position: sticky; top: 0; z-index: 1000; background: rgba(0, 0, 0, 0.4); 
            backdrop-filter: blur(30px) saturate(210%); -webkit-backdrop-filter: blur(30px) saturate(210%);
            padding: calc(var(--safe-top) + 2px) 16px 8px 16px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 12px; 
            border-bottom: 0.5px solid rgba(255, 255, 255, 0.05);
            margin-left: -16px; margin-right: -16px;
        }
        .header-side { width: 85px; display: flex; align-items: center; }
        .header-side.right { justify-content: flex-end; }
        .logo-img { height: 30px; width: auto; object-fit: contain; }
        .title-stack { display: flex; flex-direction: column; align-items: center; text-align: center; }
        .main-title { font-weight: 900; font-size: 18px; line-height: 1; letter-spacing: -0.5px; color: var(--accent); text-transform: uppercase; }
        .sub-title { color: #8e8e93; font-size: 9px; font-weight: 700; margin-top: 2px; text-transform: uppercase; letter-spacing: 1.5px; }
        
        .tab-bar { position: absolute; bottom: calc(var(--safe-bottom) + 10px); left: 12px; right: 12px; background: rgba(35, 35, 35, 0.1); backdrop-filter: blur(45px) saturate(250%) brightness(1.2); -webkit-backdrop-filter: blur(45px) saturate(250%) brightness(1.2); border: 0.5px solid rgba(255, 255, 255, 0.15); display: flex; border-radius: 38px; height: 70px; z-index: 9999; padding: 0 6px; align-items: center; box-shadow: 0 18px 45px rgba(0,0,0,0.5); }
        .tab-indicator { position: absolute; height: 54px; background: linear-gradient(135deg, rgba(255,255,255,0.18), rgba(255,255,255,0.10)); border-radius: 32px; transition: all 0.45s cubic-bezier(0.25, 0.8, 0.25, 1.2); z-index: 0; }
        .tab-item { flex: 1; height: 54px; display: flex; flex-direction: column; align-items: center; justify-content: center; color: rgba(255,255,255,0.4); font-size: 8.5px; font-weight: 800; border-radius: 32px; transition: all 0.3s; position: relative; z-index: 1; }
        .tab-item.active { color: #ffffff; }
        .tab-icon { font-size: 21px; margin-bottom: 2px; }
        
        label { display: block; margin-bottom: 4px; color: #8e8e93; font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; }
        select, input { width: 100%; padding: 10px; background: rgba(44, 44, 46, 0.6); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; outline: none; margin-bottom: 6px; }
        
        .btn-save { background: #34c759; color: white; border: none; padding: 14px; border-radius: 16px; font-size: 16px; font-weight: 900; width: 100%; margin-top: 5px; }
        .win-btn { flex: 1; padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.03); color: #8e8e93; font-weight: 800; text-align: center; }
        .win-btn.selected { border-color: var(--accent); background: rgba(255, 204, 0, 0.15); color: var(--accent); }

        .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 30000; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: opacity 0.4s ease; }
        .loader-logo { height: 80px; width: auto; margin-bottom: 15px; }
        .loader-title { font-weight: 900; font-size: 24px; color: var(--accent); text-transform: uppercase; margin-bottom: 30px; }
        .spinner { width: 45px; height: 45px; border: 4px solid rgba(255, 204, 0, 0.1); border-top: 4px solid var(--accent); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loading-overlay" class="loading-overlay">
        <img src="logo.png" class="loader-logo" onerror="this.style.display='none'">
        <div class="loader-title">Billardkrüppel</div>
        <div class="spinner"></div>
        <div style="margin-top: 20px; font-weight: 900; font-size: 11px; color: var(--accent); text-transform: uppercase; letter-spacing: 2px;">Synchronisiere...</div>
    </div>

    <div class="app-container">
        <div class="main-content" id="scroll-area">
            <!-- Ansicht: Aufzeichnen -->
            <div id="view-aufzeichnen" class="view active">
                <div class="header-container">
                    <div class="header-side"><img src="logo.png" class="logo-img"></div>
                    <div class="title-stack"><div class="main-title">Billardkrüppel</div><div class="sub-title">Match erfassen</div></div>
                    <div class="header-side right"><img src="logo.png" class="logo-img"></div>
                </div>
                <div class="card">
                    <label>Spielmodus</label>
                    <select id="mode" onchange="updateUI()">
                        <option value="1:1">1 gegen 1</option>
                        <option value="2:2">2 gegen 2</option>
                    </select>
                    <div id="ui-1-1">
                        <label>Spieler 1</label><select class="player-sel" id="p1"></select>
                        <label>Spieler 2</label><select class="player-sel" id="p2"></select>
                    </div>
                    <!-- Weiteres UI wie in deiner App... -->
                    <button class="btn-save" onclick="doSave()">Speichern</button>
                </div>
            </div>
            <!-- Weitere Views hier einfügen (Historie, Statistik etc.) -->
        </div>

        <div class="tab-bar">
            <div id="tab-indicator" class="tab-indicator"></div>
            <div class="tab-item active" onclick="switchV('aufzeichnen',this)"><span class="tab-icon">🎱</span><span>Match</span></div>
            <div class="tab-item" onclick="switchV('statistik',this)"><span class="tab-icon">📊</span><span>Statistik</span></div>
        </div>
    </div>

    <script src="Chart.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD7bNfdV48Setz8aRNd4i3kzKO41kNOHio",
            authDomain: "billardpro-35edb.firebaseapp.com",
            projectId: "billardpro-35edb",
            storageBucket: "billardpro-35edb.firebasestorage.app",
            messagingSenderId: "772454762231",
            appId: "1:772454762231:web:c8fb5794d5af99b045f5f2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        signInAnonymously(auth).then(() => {
            console.log("Verbunden mit Firebase");
            initApp();
        });

        function initApp() {
            // Snapshot für Stats
            onSnapshot(doc(db, "billard_data", "stats"), (snap) => {
                if (snap.exists()) {
                    window.stats = snap.data().matches || [];
                    window.hideLoader();
                    renderAll();
                }
            });

            // Snapshot für Spieler
            onSnapshot(doc(db, "billard_data", "spieler"), (snap) => {
                if (snap.exists()) {
                    const names = snap.data().names || [];
                    updatePlayerDropdowns(names);
                }
            });
        }

        window.hideLoader = () => {
            document.getElementById('loading-overlay').style.opacity = '0';
            setTimeout(() => document.getElementById('loading-overlay').style.display = 'none', 400);
        };

        function updatePlayerDropdowns(names) {
            document.querySelectorAll('.player-sel').forEach(sel => {
                sel.innerHTML = '<option value="">Wählen</option>';
                names.forEach(n => sel.options.add(new Option(n, n)));
            });
        }

        window.doSave = async () => {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            if(!p1 || !p2) return alert("Spieler wählen!");
            
            const match = { p1, p2, d: new Date().toLocaleString(), w: 1 }; // Beispiel
            window.stats.push(match);
            await setDoc(doc(db, "billard_data", "stats"), { matches: window.stats });
            alert("Gespeichert!");
        };

        window.switchV = (id, el) => {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('.tab-item').forEach(t => t.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('tab-indicator').style.left = el.offsetLeft + 'px';
        };
    </script>
</body>
</html>
